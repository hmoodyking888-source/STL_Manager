workflows:
  android-workflow:
    name: STL Manager Android

    environment:
      flutter: stable

    scripts:
      - flutter clean
      - flutter pub get
      - flutter build apk --release

      - find build -name "*.apk"

    artifacts:
      - build//outputs//*.apk

