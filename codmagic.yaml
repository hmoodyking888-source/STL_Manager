workflows:
  android-workflow:
    name: STL Manager Android

    environment:
      flutter: stable
      java: 17

    scripts:
      - flutter clean
      - flutter pub get
      # استخدام العلم --no-tree-shake-icons يضمن عدم فشل بناء الأيقونات
      - flutter build apk --release --split-per-abi --no-tree-shake-icons

    artifacts:
      # هذا المسار سيبحث في كل المجلدات الفرعية عن أي ملف ينتهي بـ .apk
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/apk/release/*.apk
      - build//outputs//*.apk

    publishing:
      email:
        recipients:
          - hmoodyking888@gmail.com