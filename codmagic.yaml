workflows:
  android-workflow:
    name: STL Manager Android

    environment:
      flutter: stable
      java: 17

    scripts:
      - flutter clean
      - flutter pub get
      - flutter build apk --release --verbose

      - ls build/app/outputs/flutter-apk/

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

