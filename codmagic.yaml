workflows:
  android-workflow:
    name: STL Manager Android

    environment:
      flutter: stable
      java: 17

    scripts:
      - flutter clean
      - flutter pub get
      - flutter build apk --release --verbose

      - echo "APK FILES:"
      - find . -name "*.apk"

    artifacts:
      - "**/*.apk"

    publishing:
      email:
