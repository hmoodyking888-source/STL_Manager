name: stl_manager
description: تطبيق إدارة شبكة سلطان نت
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
    
  lottie: ^3.1.0


  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.3.1

  # RouterOS MikroTik
  routeros_api: ^0.1.4

  # Secure Storage
  flutter_secure_storage: ^10.2.0

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^4.8.0
  firebase_messaging: ^16.2.1

  # UI & Animations
  flutter_animate: ^4.5.0
  animate_do: ^5.1.0

  # Charts
  fl_chart: ^1.2.0

  # Gauges
  syncfusion_flutter_gauges: ^33.2.6

  # Icons
  font_awesome_flutter: ^11.0.0
  hugeicons: ^1.1.7

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^7.1.1

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Google Fonts
  google_fonts: ^8.1.0

  # Loading
  flutter_spinkit: ^5.2.1

  # Toasts
  fluttertoast: ^9.0.0

  # SVG
  flutter_svg: ^2.0.10+1

  # Badges
  badges: ^3.1.2

  # Percent Indicator
  percent_indicator: ^4.2.3

  # Shimmer
  shimmer: ^3.0.0

  # Intl
  intl: ^0.20.2
  shared_preferences: ^2.5.5
dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  assets:
    - assets/icons/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf