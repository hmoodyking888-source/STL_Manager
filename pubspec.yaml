name: stl_manager
description: تطبيق إدارة شبكة سلطان نت
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # RouterOS MikroTik
  routeros_api: ^0.1.4

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # UI & Animations
  flutter_animate: ^4.5.0
  animate_do: ^3.3.4

  # Charts
  fl_chart: ^0.69.0

  # Gauges
  syncfusion_flutter_gauges: ^27.1.48

  # Icons
  font_awesome_flutter: ^10.7.0
  hugeicons: ^0.0.7

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Google Fonts
  google_fonts: ^6.2.1

  # Loading
  flutter_spinkit: ^5.2.1

  # Toasts
  fluttertoast: ^8.2.8

  # SVG
  flutter_svg: ^2.0.10+1

  # Badges
  badges: ^3.1.2

  # Percent Indicator
  percent_indicator: ^4.2.3

  # Shimmer
  shimmer: ^3.0.0

  # Intl
  intl: ^0.19.0
dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700