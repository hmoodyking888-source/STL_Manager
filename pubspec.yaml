name: stl_manager
description: تطبيق إدارة شبكة سلطان نت
publish_to: "none"

# التحديث للنسخة الجديدة التي اتفقنا عليها
version: 1.2.1+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  lottie: ^3.1.0
  shared_preferences: ^2.5.5 # تم إبقاء نسخة واحدة فقط مصلحة
  http: ^1.1.0
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  routeros_api: ^0.1.4
  flutter_secure_storage: ^10.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^4.8.0
  firebase_messaging: ^16.2.1
  flutter_animate: ^4.5.0
  animate_do: ^5.1.0
  fl_chart: ^1.2.0
  syncfusion_flutter_gauges: ^33.2.6
  font_awesome_flutter: ^11.0.0
  hugeicons: ^1.1.7
  dio: ^5.7.0
  connectivity_plus: ^7.1.1
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.1.0
  flutter_spinkit: ^5.2.1
  fluttertoast: ^9.0.0
  flutter_svg: ^2.0.10+1
  badges: ^3.1.2
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

# إعدادات الأيقونات (تم تصحيح مكانها)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/ # تأكد من وجود صورة الأسد هنا
    - assets/icons/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf