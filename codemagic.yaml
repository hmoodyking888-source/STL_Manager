workflows:
  android-workflow:
    name: STL Manager Android

    environment:
      flutter: stable
      java: 17

    scripts:
      - flutter clean
      - flutter pub get

      # بناء التطبيق
      - flutter build apk --release --no-tree-shake-icons --verbose

      # عرض كل ملفات APK الموجودة
      - find /Users/builder/clone -name "*.apk"

      # عرض ملفات build كاملة
      - ls -R build/app/outputs || true

    artifacts:
      - build///*.apk

    publishing:
      email:
        recipients:
          - hmoodyking888@gmail.com