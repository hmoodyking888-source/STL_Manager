workflows:
  android-workflow:
    name: STL Manager Final Build
    environment:
      flutter: stable
      java: 17
      ndk: 28.2.13676358
    scripts:
      - name: Icons Generator
        script: |
          flutter pub get
          # تفعيل هذا السطر إذا أضفت مكتبة الأيقونات
          # flutter pub run flutter_launcher_icons
      - name: Build APK
        script: |
          flutter clean
          flutter build apk --release --no-tree-shake-icons
      - name: Export
        script: |
          mkdir -p $FCI_EXPORT_DIR
          find build/app/outputs/flutter-apk -name "*.apk" -exec cp {} $FCI_EXPORT_DIR/STL_Manager.apk \;
    artifacts:
      - $FCI_EXPORT_DIR/STL_Manager.apk