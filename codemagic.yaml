workflows:
  android-workflow:
    name: STL Manager Android
    environment:
      flutter: stable
      java: 17
    scripts:
      - flutter clean
      - flutter pub get
      # بناء التطبيق لمعمارية الهاتف المحددة
      - flutter build apk --release --no-tree-shake-icons --target-platform android-arm64
      - |
        # البحث عن الـ APK المفقود ووضعه في مكان يسهل على Codemagic رؤيته
        mkdir -p build/app/outputs/flutter-apk
        find build -name "*.apk" -exec cp {} build/app/outputs/flutter-apk/ \;
    artifacts:
      # التقاط أي ملف APK يتم إنتاجه في أي مكان داخل المشروع
      - build/**/*.apk
    publishing:
      email:
        recipients:
          - hmoodyking888@gmail.com