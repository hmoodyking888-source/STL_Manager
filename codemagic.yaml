workflows:
  android-workflow:
    name: STL Manager Android

    environment:
      flutter: stable
      java: 17

    scripts:
      - flutter clean
      - flutter pub get

      # بناء التطبيق
      - flutter build apk --release --no-tree-shake-icons --verbose

      # عرض جميع ملفات APK الموجودة
      - echo "========= SEARCHING APK FILES ========="
      - find . -name "*.apk"

      # عرض مجلدات البناء كاملة
      - echo "========= BUILD FOLDERS ========="
      - ls -R build

    artifacts:
      - "**/*.apk"

    publishing:
      email:
        recipients:
          - hmoodyking888@gmail.com