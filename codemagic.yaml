workflows:
  android-workflow:
    name: STL Manager Android
    environment:
      flutter: stable
      java: 17
    scripts:
      - flutter clean
      - flutter pub get
      # بناء ملف APK واحد شامل (Fat APK) لضمان سهولة العثور عليه وتوزيعه
      - flutter build apk --release --no-tree-shake-icons
    artifacts:
      # البحث في كل المجلدات الممكنة عن أي ملف APK تم إنتاجه
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - hmoodyking888@gmail.com