workflows:
  android-workflow:
    name: STL Manager Android
    environment:
      flutter: stable
      java: 17
    scripts:
      - flutter clean
      - flutter pub get
      # استخدام الأمر المباشر لضمان البناء
      - flutter build apk --release --no-tree-shake-icons --target-platform android-arm64
      - |
        # أهم خطوة: البحث عن ملف الـ APK ونسخه يدوياً لمجلد المخرجات العام
        mkdir -p build/app/outputs/flutter-apk
        find build -name "*.apk" -exec cp {} build/app/outputs/flutter-apk/ \;
    artifacts:
      # سنطلب من كود ماجيك عرض أي ملف APK يجده في أي مكان في المشروع
      - build/**/*.apk
    publishing:
      email:
        recipients:
          - hmoodyking888@gmail.com