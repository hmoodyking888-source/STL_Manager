workflows:
  android-workflow:
    name: STL Manager Android
    environment:
      flutter: stable
      java: 17
    scripts:
      - flutter clean
      - flutter pub get
      # بناء التطبيق مع تحديد المعمارية بشكل صريح
      - flutter build apk --release --no-tree-shake-icons --target-platform android-arm64
      - |
        echo "--- جاري البحث عن ملف الـ APK في كل المجلدات ---"
        find . -name "*.apk"
        
        # إنشاء المجلد المطلوب ونقل الملف أينما وجد
        mkdir -p build/app/outputs/flutter-apk
        find . -name "*.apk" -exec cp {} build/app/outputs/flutter-apk/ \;
        
        echo "--- تم نقل الملف بنجاح إلى المجلد المستهدف ---"
        ls -la build/app/outputs/flutter-apk/
    artifacts:
      # التقاط أي ملف APK يتم إنتاجه في أي مكان داخل المشروع
      - build/**/*.apk
    publishing:
      email:
        recipients:
          - hmoodyking888@gmail.com