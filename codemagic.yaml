workflows:
  android-workflow:
    name: STL Manager Android
    environment:
      flutter: stable
      java: 17
    scripts:
      - flutter clean
      - flutter pub get
      # استخدام أمر البناء الأساسي لضمان خروج ملف واحد شامل
      - flutter build apk --release --no-tree-shake-icons
    artifacts:
      # هذا السطر سيبحث في كل مكان داخل مجلد build عن أي ملف apk
      - build/**/*.apk
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - hmoodyking888@gmail.com